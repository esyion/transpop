name: Publish installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release, for example v0.1.0'
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: write

concurrency:
  group: publish-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify release tag matches app version
        shell: pwsh
        run: |
          $config = Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json
          $expectedTag = "v$($config.version)"
          if ($env:RELEASE_TAG -ne $expectedTag) {
            Write-Error "Release tag '$env:RELEASE_TAG' does not match src-tauri/tauri.conf.json version '$($config.version)'. Expected tag '$expectedTag'."
            exit 1
          }

      - name: Create clean draft release
        id: create-release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          result-encoding: string
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const matching = releases.filter((release) => release.tag_name === tag);
            const published = matching.find((release) => !release.draft);
            if (published) {
              core.setFailed(`Release ${tag} already exists and is published: ${published.html_url}`);
              return '';
            }
            for (const draft of matching) {
              core.info(`Deleting existing draft release ${draft.id} for ${tag}`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: draft.id });
            }
            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `TransPop ${tag}`,
              body: [
                'TransPop installer packages.',
                '',
                'Download the asset that matches your operating system.',
              ].join('\n'),
              draft: true,
              prerelease: tag.includes('-'),
            });
            core.info(`Created draft release ${release.id}: ${release.html_url}`);
            return String(release.id);

  publish-tauri:
    name: Build ${{ matrix.label }} installer
    needs: create-release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - label: Linux x64
            platform: ubuntu-22.04
            args: ''
          - label: Windows x64
            platform: windows-latest
            args: ''

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tauriScript: pnpm tauri
          releaseId: ${{ needs.create-release.outputs.release-id }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseAssetNamePattern: TransPop_[version]_[platform]_[arch][setup].[ext]
          args: ${{ matrix.args }}

  publish-release:
    name: Publish GitHub Release
    needs:
      - create-release
      - publish-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Publish release after all installers are uploaded
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const release_id = Number('${{ needs.create-release.outputs.release-id }}');
            const { data: release } = await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id,
              draft: false,
            });
            core.info(`Published ${release.html_url}`);
